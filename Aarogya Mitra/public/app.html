<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarogya Mitra | Patient Portal</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        :root {
            --phone-height: 85vh; /* Always take up 85% of screen height */
            --phone-width: calc(var(--phone-height) * 0.46); /* Maintain perfect iPhone aspect ratio */
            --phone-border: calc(var(--phone-height) * 0.018);
            --phone-radius: calc(var(--phone-height) * 0.07);
            --primary: #3b82f6;
            --bg: #0f172a;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            gap: 60px;
            align-items: center;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }

        .info-panel {
            flex: 1;
            color: white;
        }

        .info-panel h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .info-panel p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-top: 20px;
            max-width: 450px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 100px;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 24px;
        }

        .device-container {
            position: relative;
            filter: drop-shadow(0 50px 100px rgba(0,0,0,0.5));
        }

        .iphone-15 {
            width: var(--phone-width);
            height: var(--phone-height);
            background: #000;
            border-radius: var(--phone-radius);
            position: relative;
            padding: var(--phone-border);
            box-shadow: 
                inset 0 0 4px 2px rgba(255,255,255,0.1),
                0 0 0 2px #1e293b;
            z-index: 1;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: calc(var(--phone-radius) - var(--phone-border));
            overflow: hidden;
            position: relative;
        }

        .screen iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            padding: 0 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: #000;
            z-index: 15;
            pointer-events: none;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 16px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 1000px) {
            .wrapper { flex-direction: column; text-align: center; gap: 40px; }
            .info-panel p { margin: 20px auto; }
            .controls { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="info-panel">
            <div class="badge"><span>●</span> Production Deployment</div>
            <div style="margin-bottom: 24px;">
                <img src="/favicon.png" alt="Logo" style="width: 64px; height: 64px; object-contain: contain; filter: drop-shadow(0 10px 20px rgba(59, 130, 246, 0.3));">
            </div>
            <h1>Aarogya Mitra<br>Patient Portal</h1>
            <p>Experience the future of healthcare management through our high-fidelity mobile interface.</p>
            
            <div class="controls">
                <button class="btn btn-primary" onclick="document.querySelector('iframe').src += ''">
                    Refresh App
                </button>

            </div>
        </div>

        <div class="device-container">
            <div class="iphone-15">
                <div class="status-bar">
                    <span id="time">9:41</span>
                    <div style="display: flex; gap: 4px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z"/></svg>
                    </div>
                </div>
                <div class="screen">
                    <!-- Point directly to index.html for production -->
                    <iframe src="index.html" allow="geolocation; microphone; camera"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
